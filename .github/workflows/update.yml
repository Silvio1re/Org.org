name: Update IPTV List

on:
  schedule:
    - cron: '0 0 * * *'   # Svaki dan u ponoć
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Make validator executable
        run: chmod +x update/validate.sh
      
      - name: Run validation
        run: ./update/validate.sh
      
      - name: Commit and push if changed
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add playlists/main.m3u
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update playlist $(date +'%Y-%m-%d %H:%M')"
            git push
          else
            echo "Nema promjena za commit."
          fi
