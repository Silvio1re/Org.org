name: Update IPTV List

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Make validator executable
        run: chmod +x update/validate.sh
      
      - name: Run validation
        run: ./update/validate.sh
      
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playlists/main.m3u
          git diff --staged --quiet || git commit -m "Auto-update playlist $(date +'%Y-%m-%d %H:%M')"
          git push
